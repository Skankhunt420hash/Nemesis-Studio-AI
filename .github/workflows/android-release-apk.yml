name: Build Signed Release APK

on:
  workflow_dispatch:
    inputs:
      cap_server_url:
        description: "Produktive URL (z. B. https://dein-projekt.vercel.app)"
        required: true
        type: string

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Secret ANDROID_KEYSTORE_BASE64 fehlt."
            exit 1
          fi
          mkdir -p .keystore
          echo "$KEYSTORE_BASE64" | base64 -d > .keystore/release.jks

      - name: Sync Capacitor with production URL
        env:
          CAP_SERVER_URL: ${{ inputs.cap_server_url }}
        run: npx cap sync android

      - name: Build signed release APK
        working-directory: android
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_PASS" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASS" ]; then
            echo "Einer oder mehrere Secrets fehlen: ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease \
            -Pandroid.injected.signing.store.file="../../.keystore/release.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: nemesis-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
